# TRINITY MCP Server v2.2 — Fly.io Global Edge Deployment
# φ² + 1/φ² = 3 = TRINITY
#
# One-command deploy: fly deploy -c fly.mcp.toml
# Global regions: AMS, LAX, NRT, SIN, FRA, SYD

app = "trinity-mcp-v2"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.mcp"

[env]
  TRINITY_MCP_PORT = "8899"
  TRINITY_MCP_HOST = "0.0.0.0"
  TRINITY_LOG_LEVEL = "info"
  TRINITY_CACHE_SIZE = "100"
  TRINITY_MAX_CONNECTIONS = "1000"
  TRINITY_ENABLE_METRICS = "true"
  TRINITY_METRICS_PORT = "9090"

[experimental]
  allowed_public_ports = [8899, 3000, 9090]
  auto_rollback = true

[deploy]
  strategy = "rolling"

[[services]]
  protocol = "tcp"
  internal_port = 8899
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 8899
    handlers = ["http", "tls"]
    force_https = true

  [[services.ports]]
    port = 3000
    handlers = ["http", "tls"]
    force_https = true

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    restart_limit = 0

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    restart_limit = 0

  [[services.metrics]]
    port = 9090
    path = "/metrics"

# Metrics endpoint for Prometheus
[metrics]
  port = 9090
  path = "/metrics"

# Global regions — Anycast for <30ms latency worldwide
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Volume for eternal logs
[[mounts]]
  source = "trinity_logs"
  destination = "/app/logs"
  initial_size = "1GB"
  expand_on_upgrade = true
