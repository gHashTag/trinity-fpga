# fly.toml — FPGA Synthesis Service
app = "trinity-fpga-synth"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[vm]
  cpu = "4"
  memory = "8gb"

  # Larger disk for toolchain
  size_gb = 40

[[mounts]]
  source = "fpga_data"
  destination = "/data"
