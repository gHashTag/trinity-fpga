# ═══════════════════════════════════════════════════════════════════════════════
# TRINITY FPGA — OpenOCD Configuration for JTAG UART
# ═══════════════════════════════════════════════════════════════════════════════
#
# Target: QMTECH XC7A100T-1FGG676C
# JTAG: Xilinx Platform Cable USB II (VID:0x03fd PID:0x0013)
#
# Usage:
#   openocd -f openocd/qmtech_jtag.cfg
# ═══════════════════════════════════════════════════════════════════════════════

#===============================================================================
# TRANSPORT CONFIGURATION
#===============================================================================

# Use FTDI adapter (Xilinx Platform Cable USB II)
# Note: VID/PID may need adjustment based on your cable
adapter driver ftdi

# Xilinx Platform Cable USB II (after fxload: 0x0403:0x6010)
# Original (before fxload): 0x03fd:0x0013
adapter vid pid 0x0403 0x6010

# FTDI channel settings (Channel 0 for JTAG)
ftdi channel 0
ftdi layout_init 0x0c08 0x0f1b
ftdi tdo_sample_edge falling

# JTAG speed (start slow, increase after testing)
adapter speed 1000
adapter srst delay 200

#===============================================================================
# JTAG CHAIN
#===============================================================================

# Xilinx 7-series uses a single device in the JTAG chain
# The device ID will be detected automatically

# Create a test target for the FPGA
# This allows us to access the JTAG chain without full CPU support
tap testchip

# Expected IDCODE for XC7A100T (may vary)
# Format: Manufacturer (4 bits) | Part (16 bits) | Version (12 bits)
# Xilinx ID: 0x0372e093 (check your device with `openocd -f interface/ftdi.cfg -c "init; scan_chain"`)

#===============================================================================
# TARGET CONFIGURATION
#===============================================================================

# Generic Xilinx FPGA target
# We'll use the "testchip" target which allows raw JTAG access
target create trinity_fpga testchain -chain-position 0

# Configure IR length (Xilinx 7-series uses 6-bit IR)
trinity_fpga configure -event examine-end {
    puts "TRINITY FPGA detected!"
    puts "IR length: 6 bits"
    puts "Ready for JTAG UART communication"
}

#===============================================================================
# USER1 INSTRUCTION ACCESS
#===============================================================================

# USER1 instruction code for Xilinx 7-series: 0x22 (decimal 34)
# This gives access to a 32-bit data register

proc jtag_uart_init {} {
    # Select USER1 instruction
    irscan trinity_fpga 0x22
    puts "JTAG UART: USER1 instruction selected (0x22)"
}

#===============================================================================
# JTAG UART FUNCTIONS
#===============================================================================

# Write a byte to FPGA
# Usage: jtag_uart_write 0x41  (writes 'A')
proc jtag_uart_write { byte } {
    global jtag_uart_tx_enabled

    # Ensure USER1 is selected
    jtag_uart_init

    # Write to data register: {byte, 0x00FF}
    # The lower 16 bits are for RX data (we set to 0xFF for "no data")
    set data_value [expr {$byte * 65536 + 0xFF}]

    # Write to DR
    drscan trinity_fpga $data_value
}

# Read a byte from FPGA
# Usage: set value [jtag_uart_read]
proc jtag_uart_read {} {
    # Ensure USER1 is selected
    jtag_uart_init

    # Read from DR
    set result [drscan trinity_fpga 0xFFFFFFFF]

    # Extract lower 16 bits (RX data)
    set rx_value [expr {$result & 0xFFFF}]

    return $rx_value
}

# Write string to FPGA
# Usage: jtag_uart_puts "Hello"
proc jtag_uart_puts { str } {
    set len [string length $str]
    for {set i 0} {$i < $len} {incr i} {
        set ch [string index $str $i]
        scan $ch %c byte
        jtag_uart_write $byte
        after 1
    }
}

#===============================================================================
# INITIALIZATION
#===============================================================================

init
jtag_uart_init

puts ""
puts "═══════════════════════════════════════════════════════════════"
puts "  TRINITY JTAG UART - Ready"
puts "═══════════════════════════════════════════════════════════════"
puts ""
puts "Available commands:"
puts "  jtag_uart_write <byte>   - Write byte to FPGA"
puts "  jtag_uart_read            - Read byte from FPGA"
puts "  jtag_uart_puts <string>   - Write string to FPGA"
puts ""
puts "Example:"
puts "  jtag_uart_puts \"PING\""
puts ""
puts "═══════════════════════════════════════════════════════════════"
