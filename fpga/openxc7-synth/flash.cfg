# OpenOCD for Xilinx Artix-7 via FTDI
adapter driver ftdi
ftdi vid 0x03fd
ftdi pid 0x0013
ftdi channel 0
reset_config none
transport select jtag

# Create JTAG tap chain for XC7A100T
jtag newtap xc7a100t tap -irlen 6 -expected-id 0x0372e093

# Create target
target create xc7a100t.cpu testee -chain-position xc7a100t.tap

# Initialize JTAG
init

# Load bitstream via Xilinx FPGA programming
pld load 0 /work/quantum_bridge_violation.bit

# Shutdown
shutdown
