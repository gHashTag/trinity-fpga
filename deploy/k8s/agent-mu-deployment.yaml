# AGENT MU v10.0 - Kubernetes Deployment
# Cycle 56: Production-ready with VIBEE-generated PAS daemon

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-mu-config
  namespace: trinity
data:
  config.yaml: |
    daemon:
      analysis_interval_ms: 1000
      auto_apply_threshold: 0.95
      broadcast_enabled: true
      max_queue_size: 1000
      enable_sacred_scoring: true

    meta_learner:
      enabled: true
      phi_weighted_consensus: true
      cross_agent_validation: true

    predictive:
      markov_enabled: true
      monte_carlo_enabled: true
      confidence_threshold: 0.90

    evolution:
      checkpoint_enabled: true
      max_checkpoints: 100
      auto_branch: true

    logging:
      level: info
      format: json

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-mu
  namespace: trinity
  labels:
    app: agent-mu
    version: v10.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agent-mu
  template:
    metadata:
      labels:
        app: agent-mu
        version: v10.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: agent-mu
        image: ghcr.io/ghashtag/trinity/agent-mu:v10.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: websocket
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: AGENT_MU_CONFIG
          value: "/etc/agent-mu/config.yaml"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/agent-mu
          readOnly: true
        - name: checkpoint-dir
          mountPath: /data/checkpoints
      volumes:
      - name: config
        configMap:
          name: agent-mu-config
      - name: checkpoint-dir
        persistentVolumeClaim:
          claimName: agent-mu-checkpoints

---
apiVersion: v1
kind: Service
metadata:
  name: agent-mu
  namespace: trinity
  labels:
    app: agent-mu
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: websocket
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9090
    targetPort: 9090
  selector:
    app: agent-mu

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-mu-checkpoints
  namespace: trinity
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-mu-hpa
  namespace: trinity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-mu
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
