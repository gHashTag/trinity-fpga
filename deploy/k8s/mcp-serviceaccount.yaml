# Trinity MCP Server - ServiceAccount + RBAC
# φ² + 1/φ² = 3 = TRINITY
#
# Minimal permissions for MCP server

apiVersion: v1
kind: ServiceAccount
metadata:
  name: trinity-mcp
  namespace: default
  labels:
    app: trinity-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trinity-mcp
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trinity-mcp
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trinity-mcp
subjects:
- kind: ServiceAccount
  name: trinity-mcp
  namespace: default
