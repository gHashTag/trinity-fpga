# Trinity MCP Server - Kubernetes Deployment
# φ² + 1/φ² = 3 = TRINITY
#
# Deploys production-ready MCP server with:
# - 2 replicas (HA)
# - Resource limits (CPU/Memory)
# - Health checks (liveness + readiness)
# - Rolling update strategy

apiVersion: apps/v1
kind: Deployment
metadata:
  name: trinity-mcp
  namespace: default
  labels:
    app: trinity-mcp
    version: "2.1.0"
    component: mcp-server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: trinity-mcp
  template:
    metadata:
      labels:
        app: trinity-mcp
        version: "2.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8899"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: trinity-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: trinity-mcp
        image: trinity/mcp:2.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8899
          protocol: TCP
        - name: http-alt
          containerPort: 3000
          protocol: TCP
        env:
        - name: TRINITY_MCP_PORT
          value: "8899"
        - name: TRINITY_MCP_HOST
          value: "0.0.0.0"
        - name: RUST_LOG
          value: "info"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: cache
          mountPath: /app/cache
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 100Mi
