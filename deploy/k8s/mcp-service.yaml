# Trinity MCP Server - Kubernetes Service
# φ² + 1/φ² = 3 = TRINITY
#
# Exposes MCP server via:
# - ClusterIP for internal access
# - LoadBalancer for external access (optional)

apiVersion: v1
kind: Service
metadata:
  name: trinity-mcp
  namespace: default
  labels:
    app: trinity-mcp
    component: mcp-server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8899"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 8899
    targetPort: http
    protocol: TCP
  - name: http-alt
    port: 3000
    targetPort: http-alt
    protocol: TCP
  selector:
    app: trinity-mcp

---
# LoadBalancer variant (for external access)
apiVersion: v1
kind: Service
metadata:
  name: trinity-mcp-lb
  namespace: default
  labels:
    app: trinity-mcp
    component: mcp-server
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - name: http
    port: 8899
    targetPort: http
    protocol: TCP
  selector:
    app: trinity-mcp
