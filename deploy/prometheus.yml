# Prometheus configuration for Trinity Swarm monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'trinity-swarm'
    environment: 'production'

scrape_configs:
  - job_name: 'trinity-swarm'
    static_configs:
      - targets:
        - 'swarm-runtime:9090'
    metrics_path: '/metrics'
    scrape_interval: 30s
