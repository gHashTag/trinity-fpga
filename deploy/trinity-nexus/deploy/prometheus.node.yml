# Prometheus Configuration for Trinity Node
# Scrapes metrics from the Trinity Node Prometheus endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'trinity-node'
    static_configs:
      - targets: ['trinity-node:9090']
        labels:
          instance: 'trinity-node-primary'
    metrics_path: '/metrics'
    scrape_interval: 10s
