# Trinity MCP Server - Service Template
# φ² + 1/φ² = 3 = TRINITY

apiVersion: v1
kind: Service
metadata:
  name: {{ include "trinity-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trinity-mcp.labels" . | nindent 4 }}
    app: trinity-mcp
  annotations:
    {{- if .Values.monitoring.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.service.port }}"
    prometheus.io/path: "/metrics"
    {{- end }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: None
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
  - name: http-alt
    port: {{ .Values.service.altPort }}
    targetPort: http-alt
    protocol: TCP
  selector:
    {{- include "trinity-mcp.selectorLabels" . | nindent 4 }}
