# Trinity MCP Server - ServiceMonitor Template
# φ² + 1/φ² = 3 = TRINITY

{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "trinity-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trinity-mcp.labels" . | nindent 4 }}
    app: trinity-mcp
spec:
  selector:
    matchLabels:
      {{- include "trinity-mcp.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.monitoring.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}
