# Trinity MCP Server - ServiceAccount Template
# φ² + 1/φ² = 3 = TRINITY

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trinity-mcp.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trinity-mcp.labels" . | nindent 4 }}
    app: trinity-mcp
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
