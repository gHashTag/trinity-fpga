# Wave 9 — S3 MultiObj Local Training
# φ² + 1/φ² = 3 = TRINITY
#
# 2 workers with NTP 50% + JEPA 25% + NCA 25% objective
#
# Usage:
#   docker-compose -f docker-compose.wave9.yml up -d              # Start all
#   docker-compose -f docker-compose.wave9.yml up -d w9-1         # Start specific
#   docker-compose -f docker-compose.wave9.yml stop                # Stop all
#   docker-compose -f docker-compose.wave9.yml logs -f w9-1       # Follow logs
#   docker-compose -f docker-compose.wave9.yml down -v             # Stop + clean volumes

version: '3.8'

services:
  w9-1:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.hslm-train-local.v4
    container_name: wave9-w1
    volumes:
      - ../../data/wave9/worker-1:/data/checkpoints
      - ../../data/tinystories:/data/tinystories:ro
    environment:
      - HSLM_PROFILE=s3-multiobj
      - HSLM_CTX=81
      - HSLM_NTP_WEIGHT=0.50
      - HSLM_JEPA_WEIGHT=0.25
      - HSLM_NCA_WEIGHT=0.25
      - HSLM_CRASH_TOLERANCE=0.05
      - HSLM_WAVE=9
      - HSLM_LR=1e-3
      - HSLM_LR_SCHEDULE=cosine
      - HSLM_OPTIMIZER=lamb
      - HSLM_BATCH=66
      - HSLM_STEPS=100000
      - HSLM_WARMUP=2000
      - HSLM_WD=0.01
      - HSLM_GRAD_CLIP=1.0
      - HSLM_FRESH=0
      - HSLM_SEED=1001
    restart: unless-stopped
    networks:
      - wave9-net

  w9-2:
    build:
      context: ../../
      dockerfile: deploy/Dockerfile.hslm-train-local.v4
    container_name: wave9-w2
    volumes:
      - ../../data/wave9/worker-2:/data/checkpoints
      - ../../data/tinystories:/data/tinystories:ro
    environment:
      - HSLM_PROFILE=s3-multiobj
      - HSLM_CTX=81
      - HSLM_NTP_WEIGHT=0.50
      - HSLM_JEPA_WEIGHT=0.25
      - HSLM_NCA_WEIGHT=0.25
      - HSLM_CRASH_TOLERANCE=0.05
      - HSLM_WAVE=9
      - HSLM_LR=1e-3
      - HSLM_LR_SCHEDULE=cosine
      - HSLM_OPTIMIZER=lamb
      - HSLM_BATCH=66
      - HSLM_STEPS=100000
      - HSLM_WARMUP=2000
      - HSLM_WD=0.01
      - HSLM_GRAD_CLIP=1.0
      - HSLM_FRESH=0
      - HSLM_SEED=1002
    restart: unless-stopped
    networks:
      - wave9-net

networks:
  wave9-net:
    driver: bridge
