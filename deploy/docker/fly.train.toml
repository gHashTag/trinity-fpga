# ═══════════════════════════════════════════════════════════════════════════════
# FLY.IO — HSLM Training Configuration (Wave 9)
# ═══════════════════════════════════════════════════════════════════════════════
#
# HSLM training service with S3 MultiObj configuration.
# App name pattern: hslm-w9-N (N = 1..48)
#
# φ² + 1/φ² = 3 = TRINITY
# ═══════════════════════════════════════════════════════════════════════════════

app = "hslm-w9-N"  # Replace N with actual number (1-48)
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.hslm-train"

[env]
  # S3 MultiObj Profile
  HSLM_PROFILE = "s3-multiobj"

  # Context length
  HSLM_CTX = "81"

  # Multi-objective weights
  HSLM_NTP_WEIGHT = "0.50"
  HSLM_JEPA_WEIGHT = "0.25"
  HSLM_NCA_WEIGHT = "0.25"
  HSLM_CRASH_TOLERANCE = "0.05"

  # Wave identifier
  HSLM_WAVE = "9"

  # Training hyperparameters (Golden Config)
  HSLM_LR = "1e-3"
  HSLM_LR_SCHEDULE = "cosine"
  HSLM_OPTIMIZER = "lamb"
  HSLM_BATCH = "66"
  HSLM_STEPS = "100000"
  HSLM_WARMUP = "2000"
  HSLM_WD = "0.01"
  HSLM_GRAD_CLIP = "1.0"
  HSLM_FRESH = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "180s"  # HSLM needs time to load checkpoint
    interval = "60s"
    method = "GET"
    path = "/health"
    timeout = "30s"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes — Persistent storage for checkpoints
# ═══════════════════════════════════════════════════════════════════════════════
#
# Fly.io volumes are named and persistent across restarts.
# Mount point: /data (matches Dockerfile.hslm-train)

