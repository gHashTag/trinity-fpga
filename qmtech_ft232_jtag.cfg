# QMTECH FT232RL JTAG Configuration
# Target: QMTECH XC7A100T-1FGG676C

# Use ft232r interface for FT232RL
adapter driver ft232r
adapter speed 1000
ftdi vid_pid 0x0403 0x6001
reset_config none
transport select ft232r

# XC7A100T JTAG tap
jtag newtap xc7a100t tap -irlen 6 -expected-id 0x0362d093

init
scan_chain
shutdown
