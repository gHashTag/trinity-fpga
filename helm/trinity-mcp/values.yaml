# Trinity MCP Server - Helm Values
# φ² + 1/φ² = 3 = TRINITY

# Image configuration
image:
  repository: trinity/mcp
  tag: "2.1.0"
  pullPolicy: IfNotPresent

# Deployment configuration
replicaCount: 2

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8899
  altPort: 3000
  annotations: {}

# Ingress configuration (optional)
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
  - host: mcp.trinity.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Auto-scaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Configuration via environment variables
config:
  # Server
  port: 8899
  host: "0.0.0.0"

  # Logging
  logLevel: "info"

  # Performance
  cacheSize: 100
  maxConnections: 1000
  requestTimeout: 5000

  # Security
  enableSanitization: true
  rateLimitPerMinute: 60
  maxInputSize: 1000000

  # Metrics
  enableMetrics: true
  metricsPort: 9090

# Prometheus monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Volume mounts
volumes:
  cache:
    enabled: true
    sizeLimit: 100Mi
