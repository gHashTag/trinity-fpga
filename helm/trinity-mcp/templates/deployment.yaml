# Trinity MCP Server - Deployment Template
# φ² + 1/φ² = 3 = TRINITY

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trinity-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trinity-mcp.labels" . | nindent 4 }}
    app: trinity-mcp
    version: "{{ .Values.image.tag }}"
  annotations:
    {{- if .Values.monitoring.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.config.port }}"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "trinity-mcp.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "trinity-mcp.selectorLabels" . | nindent 8 }}
        app: trinity-mcp
        version: "{{ .Values.image.tag }}"
      annotations:
        {{- if .Values.monitoring.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.config.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "trinity-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: trinity-mcp
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.config.port }}
          protocol: TCP
        - name: http-alt
          containerPort: {{ .Values.config.altPort }}
          protocol: TCP
        env:
        - name: TRINITY_MCP_PORT
          value: "{{ .Values.config.port }}"
        - name: TRINITY_MCP_HOST
          value: "{{ .Values.config.host }}"
        - name: RUST_LOG
          value: "{{ .Values.config.logLevel }}"
        - name: TRINITY_CACHE_SIZE
          value: "{{ .Values.config.cacheSize }}"
        - name: TRINITY_MAX_CONNECTIONS
          value: "{{ .Values.config.maxConnections }}"
        - name: TRINITY_REQUEST_TIMEOUT
          value: "{{ .Values.config.requestTimeout }}"
        - name: TRINITY_ENABLE_SANITIZATION
          value: "{{ .Values.config.enableSanitization }}"
        - name: TRINITY_RATE_LIMIT_PER_MINUTE
          value: "{{ .Values.config.rateLimitPerMinute }}"
        - name: TRINITY_MAX_INPUT_SIZE
          value: "{{ .Values.config.maxInputSize }}"
        - name: TRINITY_ENABLE_METRICS
          value: "{{ .Values.config.enableMetrics }}"
        {{- if .Values.config.enableMetrics }}
        - name: TRINITY_METRICS_PORT
          value: "{{ .Values.config.metricsPort }}"
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- if .Values.volumes.cache.enabled }}
        volumeMounts:
        - name: cache
          mountPath: /app/cache
        {{- end }}
      {{- if .Values.volumes.cache.enabled }}
      volumes:
      - name: cache
        emptyDir:
          sizeLimit: {{ .Values.volumes.cache.sizeLimit }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
