# Trinity MCP Server - PodDisruptionBudget Template
# φ² + 1/φ² = 3 = TRINITY

{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "trinity-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trinity-mcp.labels" . | nindent 4 }}
    app: trinity-mcp
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "trinity-mcp.selectorLabels" . | nindent 6 }}
{{- end }}
