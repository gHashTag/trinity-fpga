# ═══════════════════════════════════════════════════════════════════════════════
# TRINITY SWARM — Multi-Host Storage Network (Fly.io)
# ═══════════════════════════════════════════════════════════════════════════════
# Deploy 5+ nodes across regions for global DHT coverage.
#
# Usage:
#   fly launch --config deploy/fly.swarm.toml
#   fly scale count 5 --config deploy/fly.swarm.toml
#   fly scale count 5 --region iad,lax,ams,sin,nrt
#
# Sacred Formula: V = n × 3^k × π^m × φ^p × e^q
# Golden Identity: φ² + 1/φ² = 3
# ═══════════════════════════════════════════════════════════════════════════════

app = "trinity-swarm"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.swarm"

[env]
  # Node configuration
  TRINITY_PORT = "9334"
  TRINITY_DISCOVERY_PORT = "9333"
  TRINITY_METRICS_PORT = "9090"
  TRINITY_HEALTH_PORT = "8081"
  TRINITY_MAX_STORAGE_GB = "10"

  # Bootstrap peers (comma-separated)
  # After first deploy, set to other node IPs:
  #   fly secrets set TRINITY_BOOTSTRAP_PEERS="node1.fly.dev:9333,node2.fly.dev:9333"
  TRINITY_BOOTSTRAP_PEERS = ""

  # Swarm parameters
  TRINITY_PING_INTERVAL_MS = "5000"
  TRINITY_PEER_TIMEOUT_MS = "30000"
  TRINITY_REPLICATION_FACTOR = "3"

# TCP job server (shard transfers, DHT queries)
[[services]]
  internal_port = 9334
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 9334

# UDP discovery (peer announce, ping/pong)
[[services]]
  internal_port = 9333
  protocol = "udp"

  [[services.ports]]
    port = 9333

# Prometheus metrics
[[services]]
  internal_port = 9090
  protocol = "tcp"

  [[services.ports]]
    port = 9090

# Health check service
[[services]]
  internal_port = 8081
  protocol = "tcp"

  [[services.ports]]
    port = 8081

# VM configuration — shared CPU is sufficient for storage nodes
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048

# Health checks
[checks]
  [checks.liveness]
    grace_period = "15s"
    interval = "10s"
    method = "GET"
    path = "/health/live"
    port = 8081
    timeout = "3s"
    type = "http"

  [checks.readiness]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health/ready"
    port = 8081
    timeout = "5s"
    type = "http"

# Persistent storage for shards
[[mounts]]
  source = "trinity_shards"
  destination = "/data"
  initial_size = "10gb"
