# Trinity Nexus Workspace Configuration
# Generated: 2026-02-17
# phi^2 + 1/phi^2 = 3 = TRINITY

[workspace]
name = "trinity-nexus"
version = "0.1.0"
root = "."

# Module registry
# Each module is a self-contained Zig package with its own build.zig + build.zig.zon
# Dependencies are wired via Zig module imports in build.nexus.zig

[[modules]]
name = "trinity-core"
path = "core"
description = "VSA operations, Ternary VM, HybridBigInt, packed trit encoding"
dependencies = []

[[modules]]
name = "trinity-lang"
path = "lang"
description = "VIBEE compiler: parser, AST, code generation, multilingual targets"
dependencies = ["trinity-core"]

[[modules]]
name = "trinity-symb"
path = "symb"
description = "Symbolic AI: triple extraction, knowledge graph, DHT sync, TRI rewards"
dependencies = ["trinity-core", "trinity-lang"]

[[modules]]
name = "trinity-network"
path = "network"
description = "DHT routing, P2P communication, consensus, sync protocols"
dependencies = ["trinity-core", "trinity-symb"]

[[modules]]
name = "trinity-canvas"
path = "canvas"
description = "Photon visualization: 27-petal animation, Ralph monitor, wave modes"
dependencies = ["trinity-core"]

[[modules]]
name = "trinity-tools"
path = "tools"
description = "CLI utilities, dev tools, benchmarking, formatting, deployment scripts"
dependencies = ["trinity-core", "trinity-lang", "trinity-symb", "trinity-network", "trinity-canvas"]

[settings]
zig_version = "0.15.x"
test_command = "zig build test"
format_command = "zig fmt src/"
