# Railway Deployment Configuration for Trinity MCP Server
# φ² + 1/φ² = 3 = TRINITY

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "python -u trinity-mcp.py"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
type = "web"
name = "trinity-mcp"
env = "PORT"
forwardedPorts = [8899]
