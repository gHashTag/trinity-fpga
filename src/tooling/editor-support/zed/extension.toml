[extension]
id = "vibee"
name = "VIBEE DSL"
version = "1.0.0"
schema_version = 1
authors = ["Trinity Team <gHashTag>"]
description = "VIBEE DSL - Specification language for Trinity ternary computing"
repository = "https://github.com/gHashTag/trinity"

[language.vibee]
name = "VIBEE"
grammar = "vibee"
path_suffixes = ["vibee", "vib"]
line_comments = ["# "]
tab_size = 2
hard_tabs = false

[grammars.vibee]
repository = "https://github.com/gHashTag/trinity"
path = "src/tooling/editor-support/tree-sitter-vibee"
