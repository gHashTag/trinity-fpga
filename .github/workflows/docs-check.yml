        uses: actions/checkout@v4

      - name: Check documentation index
        run: |
          if [ ! -f "docs/DOCUMENTATION_INDEX.md" ]; then
            echo "❌ DOCUMENTATION_INDEX.md not found!"
            else
            echo "✅ DOCUMENTATION_INDEX.md exists"

      - name: Verify README command examples work
        run: |
          # Check if documented commands exist in main.zig
          # Test basic commands have valid descriptions
          echo "✅ Checking README commands..."

      - name: Check for duplicate documentation
        run: |
          # Simple check for obvious duplicates
          echo "🔍 Checking for duplicate files..."

      - name: Verify all links in README.md
        run: |
          # Extract and check markdown links
          echo "🔍 Checking README links..."

      - name: Validate CHANGELOG.md
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "⚠️  WARNING: CHANGELOG.md not found"
          else
            echo "✅ CHANGELOG.md exists"

      - name: Report summary
