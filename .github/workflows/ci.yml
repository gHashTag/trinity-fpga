name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Build
        run: zig build

      # This step includes memory leak detection via Zig's General Purpose Allocator (GPA).
      # Any memory leaks will cause the test to fail with a "leaked" error message.
      # This is a HARD GATE - the build will fail if any tests leak memory.
      - name: Test (with leak detection)
        run: zig build test

      - name: Format check
        run: zig fmt --check src/
