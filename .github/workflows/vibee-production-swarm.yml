# VIBEE v8 Production Swarm CI
# Tests 32-agent Trinity swarm runtime with full validation
# NOTE: Disabled auto-triggers until swarm spec + k8s manifests exist.
#       Run manually via workflow_dispatch.

name: VIBEE v8 Production Swarm

on:
  workflow_dispatch:

jobs:
  swarm-runtime-test:
    name: Production Swarm Runtime (32 agents)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            zig-out
            zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig', '**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Build project
        run: zig build

      - name: Run tests
        run: zig build test 2>&1 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swarm-logs
          path: |
            zig-out/
          retention-days: 7
