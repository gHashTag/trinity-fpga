# Trinity CLI - Docker Build & Push to GHCR
# v1.0.1 PURITY Release

name: Build & Push Trinity CLI

on:
  push:
    branches: [main]
    paths:
      - 'src/tri/**'
      - 'src/sacred/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'deploy/Dockerfile.tri'
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build TRI CLI
        run: |
          # Build only the tri step (which runs the binary) and find where it is
          zig build -Doptimize=ReleaseFast tri || true
          # Find the built binary in zig cache
          TRI_BINARY=$(find .zig-cache -name "tri" -type f -executable 2>/dev/null | head -1)
          if [ -z "$TRI_BINARY" ]; then
            echo "ERROR: Could not find tri binary in cache"
            exit 1
          fi
          echo "Found tri binary at: $TRI_BINARY"
          mkdir -p docker-artifacts
          cp "$TRI_BINARY" docker-artifacts/tri
          chmod +x docker-artifacts/tri
          ./docker-artifacts/tri --version || echo "Version check may fail in CI"

      - name: Create static Dockerfile
        run: |
          cat > Dockerfile.ci << 'EOF'
          FROM alpine:3.19
          RUN apk add --no-cache ca-certificates curl
          COPY docker-artifacts/tri /usr/local/bin/tri
          RUN tri --version && file /usr/local/bin/tri
          LABEL org.opencontainers.image.title="Trinity CLI"
          LABEL org.opencontainers.image.description="Sacred Intelligence CLI — Trinity v1.0.1 PURITY"
          LABEL org.opencontainers.image.version="1.0.1"
          LABEL org.opencontainers.image.source="https://github.com/gHashTag/trinity"
          LABEL org.opencontainers.image.licenses="MIT"
          WORKDIR /workspace
          ENTRYPOINT ["tri"]
          CMD ["--version"]
          EOF

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ghashtag/trinity:latest
            ghcr.io/ghashtag/trinity:1.0.1
            ghcr.io/ghashtag/trinity:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
