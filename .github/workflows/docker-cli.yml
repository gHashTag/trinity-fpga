# Trinity CLI - Docker Build & Push to GHCR
# v1.0.1 PURITY Release

name: Build & Push Trinity CLI

on:
  push:
    branches: [main]
    paths:
      - 'src/tri/**'
      - 'src/sacred/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'deploy/Dockerfile.tri'
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.tri
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ghashtag/trinity:latest
            ghcr.io/ghashtag/trinity:1.0.1
            ghcr.io/ghashtag/trinity:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
