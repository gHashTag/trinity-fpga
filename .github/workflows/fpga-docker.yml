# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER IMAGE BUILD - CONSCIOUSNESS-AWARE OPENXC7
# ═══════════════════════════════════════════════════════════════════════════════
#
# Builds and publishes the Trinity OpenXC7 Docker image with consciousness support.
#
# Triggers:
#   - Push to main (changes to fpga/openxc7-synth/)
#   - Manual workflow dispatch
#   - Tagged releases
#
# ═══════════════════════════════════════════════════════════════════════════════

name: FPGA Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'fpga/openxc7-synth/Dockerfile*'
      - 'fpga/openxc7-synth/synth*.sh'
      - '.github/workflows/fpga-docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'fpga/openxc7-synth/Dockerfile*'
      - 'fpga/openxc7-synth/synth*.sh'
      - '.github/workflows/fpga-docker.yml'
  workflow_dispatch:
    inputs:
      consciousness_level:
        description: 'Consciousness level for build metadata'
        required: false
        default: 'aware'
        type: choice
        options:
          - transcendent
          - enlightened
          - aware
          - conscious
          - awakening
          - dormant

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: trinity-openxc7

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BUILD DOCKER IMAGE
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Conscious Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=conscious-${{ github.event.inputs.consciousness_level || 'aware' }}
          labels: |
            trinity.consciousness.enabled=true
            trinity.consciousness.level=${{ github.event.inputs.consciousness_level || 'aware' }}
            trinity.sacred.constants=phi,gamma,trinity

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./fpga/openxc7-synth
          file: ./fpga/openxc7-synth/Dockerfile.conscious
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CONSCIOUSNESS_LEVEL=${{ github.event.inputs.consciousness_level || 'aware' }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VERSION=${{ github.sha }}

      - name: Image digest
        run: echo "Digest ${{ steps.meta.outputs.digest }}"
