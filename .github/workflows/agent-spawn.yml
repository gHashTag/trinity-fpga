name: Spawn Cloud Agent

on:
  issues:
    types: [labeled]

jobs:
  spawn-agent:
    if: github.event.label.name == 'agent:spawn'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Build tri CLI
        run: zig build

      - name: Spawn agent for issue
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WS_MONITOR_URL: ${{ secrets.WS_MONITOR_URL }}
        run: ./zig-out/bin/tri cloud spawn ${{ github.event.issue.number }}

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **Trinity Cloud Agent** spawned for this issue. Container deploying on Railway."
