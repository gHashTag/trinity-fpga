name: Trinity Agent Decompose
# Triggers when an issue is labeled 'decompose'.
# Runs `tri decompose <issue>` to split into 5 role-based sub-issues.
# Each sub-issue gets role:planner/coder/reviewer/tester/integrator + agent:spawn labels.
# The agent-spawn-pool.yml workflow picks up sub-issues automatically.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to decompose'
        required: true
        type: number
      template:
        description: 'Template: standard, bugfix, spike'
        required: false
        default: 'standard'
        type: string

concurrency:
  group: decompose-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  decompose:
    # Run if: (1) issue labeled 'decompose', or (2) workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'decompose')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "template=${{ inputs.template || 'standard' }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "template=standard" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.0-dev

      - name: Build tri CLI
        run: zig build

      - name: Comment — decomposing
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          gh issue comment "${ISSUE}" --body "$(printf '🧩 **Trinity Decompose**\n\nSplitting issue #%s into role-based sub-issues...\nTemplate: %s\nRoles: planner → coder → tester → integrator' "${ISSUE}" "${{ steps.resolve.outputs.template }}")"

      - name: Run tri decompose
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          TEMPLATE=${{ steps.resolve.outputs.template }}
          ./zig-out/bin/tri decompose "${ISSUE}" --template "${TEMPLATE}"

      - name: Remove decompose label, add status:decomposed
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          gh issue edit "${ISSUE}" --remove-label "decompose" --add-label "status:decomposed" 2>/dev/null || true

      - name: Comment — done
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.resolve.outputs.issue }}
          gh issue comment "${ISSUE}" --body "$(printf '✅ **Decomposition complete**\n\nSub-issues created with `agent:spawn` labels.\nAgents will be spawned automatically by the pool workflow.\n\nUse `tri cloud agents` to monitor progress.')"
