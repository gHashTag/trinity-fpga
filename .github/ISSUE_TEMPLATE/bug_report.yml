name: Bug Report
description: Report a bug — agent will auto-fix
labels: ["bug", "agent:spawn"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: dropdown
    id: agent
    attributes:
      label: Agent Assignment
      options:
        - "ralph (code fix)"
        - "scholar (research needed)"
        - "manual (no agent)"
      default: 0
