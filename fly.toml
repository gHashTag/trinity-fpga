# ═══════════════════════════════════════════════════════════════════════════════
# TRINITY Unified API Server - Fly.io Configuration
# Exposes all 166 commands via REST, GraphQL, gRPC, WebSocket
# φ² + 1/φ² = 3 | TRINITY v10.2
# ═══════════════════════════════════════════════════════════════════════════════

app = "trinity-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.flyio"

[env]
  PORT = "8080"
  GRPC_PORT = "9335"
  LOG_LEVEL = "info"

# TRI Unified API Service (REST + GraphQL + WebSocket)
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/api/health"

# 2 CPUs, 2GB RAM for API server
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
