# ═══════════════════════════════════════════════════════════════════════════════
# TRINITY CLI - Fly.io Configuration
# Downloads pre-built binary from GitHub Releases
# φ² + 1/φ² = 3 = TRINITY
# ═══════════════════════════════════════════════════════════════════════════════

app = "trinity-llm"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.flyio"

# Build arguments for version selection
[build.args]
  VERSION = "v10.0.0"
  ARCH = "linux-amd64"

# TRI CLI HTTP API service
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "10s"

# Shared CPU - enough for HTTP server
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
