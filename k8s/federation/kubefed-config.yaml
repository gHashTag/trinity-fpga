# VIBEE Nexus v10.1 - Multi-Cluster Federation
# Cycle 58: Federation across 3 clusters (Primary, DR, Edge)

apiVersion: core.kubefed.io/v1beta1
kind: KubeFedCluster
metadata:
  name: primary
  namespace: kube-fed-system
spec:
  schedulerEnabled: true
  apiEndpoint: https://primary.trinity.internal:6443
  caBundle: LS0tLS1CRUdJTi...
---
apiVersion: core.kubefed.io/v1beta1
kind: KubeFedCluster
metadata:
  name: dr-backup
  namespace: kube-fed-system
spec:
  schedulerEnabled: true
  apiEndpoint: https://dr.trinity.internal:6443
  caBundle: LS0tLS1CRUdJTi...
---
apiVersion: core.kubefed.io/v1beta1
kind: KubeFedCluster
metadata:
  name: edge-region-1
  namespace: kube-fed-system
spec:
  schedulerEnabled: true
  apiEndpoint: https://edge.trinity.internal:6443
  caBundle: LS0tLS1CRUdJTi...

---
# Federation PAS Sacred Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: federation-sacred-config
  namespace: trinity
data:
  config.yaml: |
    federation:
      enabled: true
      sync_interval_ms: 1000
      pas_sacred_threshold: 0.95
      auto_failover: true

    clusters:
      primary:
        role: active
        weight: 1.0
        pas_broadcast: true

      dr-backup:
        role: standby
        weight: 0.0
        pas_broadcast: true
        sync_from: primary

      edge-region-1:
        role: edge
        weight: 0.5
        pas_broadcast: true

    sacred_consensus:
      enabled: true
      min_clusters: 2
      phi_weighted: true
      trinity_identity: true

    gossip:
      enabled: true
      interval_ms: 500
      fanout: 3
      pas_signed_messages: true

---
# Federated Agent MU Deployment
apiVersion: types.kubefed.io/v1beta1
kind: FederatedDeployment
metadata:
  name: agent-mu
  namespace: trinity
spec:
  template:
    metadata:
      labels:
        app: agent-mu
        version: v10.1.0-federation
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: agent-mu
      template:
        metadata:
          labels:
            app: agent-mu
            version: v10.1.0-federation
        spec:
          containers:
          - name: agent-mu
            image: ghcr.io/ghashtag/trinity/agent-mu:v10.1.0-federation
            env:
            - name: CLUSTER_ROLE
              value: "federated"
            - name: PAS_FEDERATION_ENABLED
              value: "true"
            - name: SACRED_CONSENSUS_ENABLED
              value: "true"

  placement:
    clusters:
    - name: primary
      replicas: 3
    - name: dr-backup
      replicas: 2
    - name: edge-region-1
      replicas: 1
