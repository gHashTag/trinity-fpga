# Trinity Nexus Workspace Configuration
# Generated by NEXUS-008, extended by NEXUS-009

[workspace]
name = "trinity-nexus"
version = "0.9.0"
description = "Modular ternary computing framework with agent collaboration"

[workspace.members]
core = "trinity-nexus/core"
lang = "trinity-nexus/lang"
symb = "trinity-nexus/symb"
network = "trinity-nexus/network"
canvas = "trinity-nexus/canvas"
tools = "trinity-nexus/tools"

[dependencies]
# Dependency graph: module = [list of dependencies]
core = []
lang = ["core"]
symb = ["core", "lang"]
network = ["core", "symb"]
canvas = ["core"]
tools = ["core", "lang", "symb", "network", "canvas"]

[external]
# External workspace references (optional — gracefully skipped if missing)
[external.openclaw]
path = "/Users/playra/openclaw"
optional = true
integration = "telegram-reporting"
binary = "node openclaw.mjs"

[agents]
# Agent definitions for workspace collaboration
[agents.ralph]
role = "autonomous-developer"
permissions = ["read", "write", "build", "test", "commit"]
branch_prefix = "ralph/"
task_file = ".ralph/internal/fix_plan.md"
quality_gates = ["build", "test", "format"]

[agents.clawd]
role = "code-reviewer"
permissions = ["read", "build", "test", "review"]
branch_prefix = "clawd/"

[build]
master = "trinity-nexus/build.nexus.zig"
entry = "trinity-nexus/build.zig"
test_command = "zig build test"
test_per_module = "zig build test-{module}"

[ci]
workflow = ".github/workflows/nexus-build.yml"
trigger_branches = ["ralph/*", "main"]
modules = ["core", "lang", "symb", "network", "canvas", "tools"]

[metadata]
nexus_version = "NEXUS-009"
total_modules = 6
total_files = 266
total_lines = 149976
phi_identity = "phi^2 + 1/phi^2 = 3 = TRINITY"
