# Ralph Dashboard Powerkit Configuration
# tmux-powerkit integration for status bars on non-HOME windows

# Powerkit location (relative to project root)
set -g @powerkit-dir '.ralph/vendor/tmux-powerkit'

# Enable selective plugins (lightweight set)
set -g @plugin 'cpu'
set -g @plugin 'memory'
set -g @plugin 'datetime'
set -g @plugin 'network'

# Theme: catppuccin-mocha (matches existing Ralph colors)
# Our Salad (151) = #a6e3a1, Cyan (075) = #89dceb, Gray (244) = #9399b2
set -g @theme 'catppuccin-mocha'

# Status position: bottom
set -g status-position bottom

# Status interval: 2 seconds
set -g status-interval 2

# Layout: datetime on left, system stats on right
set -g status-left-length 40
set -g status-right-length 80

# Custom status format with Ralph colors
set -g status-left '#[bg=#1e1e2e,fg=#89dceb]#{datetime} #[bg=#1e1e2e,fg=#9399b2]|'
set -g status-right '#[bg=#1e1e2e,fg=#a6e3a1]#{cpu} #[bg=#1e1e2e,fg=#9399b2]| #[bg=#1e1e2e,fg=#89dceb]#{memory} #[bg=#1e1e2e,fg=#9399b2]| #[bg=#1e1e2e,fg=#a6e3a1]#{network}'

# Window list format
set -g window-status-format '#[fg=#9399b2]#I:#W'
set -g window-status-current-format '#[fg=#a6e3a1,bold]#I:#W'
