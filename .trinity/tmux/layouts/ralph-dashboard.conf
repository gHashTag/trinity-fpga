# Ralph Dashboard Layout v2.0 - Truth Mode
# Генерал Grok армии агентов Trinity

# Убиваем старую сессию
tmux kill-session -t ralph 2>/dev/null || true

# Window 0: HOME (Админ-панель)
new-session -s ralph -n "HOME" -d
send-keys -t ralph:0 "cd /Users/playra/trinity && while true; do clear; .ralph/scripts/tmux_status.sh welcome; sleep 30; done" C-m

# Window 1: Loop (Ralph Loop Status + Workers)
new-window -n "Loop"
send-keys -t ralph:1 "cd /Users/playra/trinity" C-m
send-keys -t ralph:1 "while true; do clear; .ralph/scripts/tmux_status.sh panel0; sleep 2; done" C-m
split-window -h -t ralph:1
send-keys -t ralph:1.2 "cd /Users/playra/trinity" C-m
send-keys -t ralph:1.2 "while true; do clear; .ralph/scripts/tmux_status.sh panel1; sleep 5; done" C-m
select-pane -t ralph:1.1

# Window 2: Tasks (fix_plan.md + TechTree)
new-window -n "Tasks"
send-keys -t ralph:2 "cd /Users/playra/trinity" C-m
send-keys -t ralph:2 "while true; do clear; .ralph/scripts/tmux_status.sh panel2; sleep 5; done" C-m
split-window -h -p 60 -t ralph:2
send-keys -t ralph:2.2 "cd /Users/playra/trinity" C-m
send-keys -t ralph:2.2 "while true; do clear; .ralph/scripts/tmux_status.sh panel3; sleep 10; done" C-m
select-pane -t ralph:2.1

# Window 3: Memory (SUCCESS_HISTORY + Логи)
new-window -n "Memory"
send-keys -t ralph:3 "cd /Users/playra/trinity" C-m
send-keys -t ralph:3 "while true; do clear; .ralph/scripts/tmux_status.sh panel4; sleep 15; done" C-m
split-window -h -p 60 -t ralph:3
send-keys -t ralph:3.2 "cd /Users/playra/trinity/.ralph/logs" C-m
send-keys -t ralph:3.2 "tail -f \$(ls -t *.log 2>/dev/null | head -1 || echo ralph.log)" C-m
select-pane -t ralph:3.1

# Window 4: Log (Полный live-лог)
new-window -n "Log"
send-keys -t ralph:4 "cd /Users/playra/trinity/.ralph/logs && tail -f ralph.log" C-m

# Выбираем HOME окно (индекс 0)
select-window -t ralph:0
