# Trinity Agent Configuration
# Generated by NEXUS-009
# Defines agent roles, permissions, and workspace coordination

[project]
name = "trinity"
type = "zig-ternary-framework"
zig_version = "0.15.x"
workspace = "trinity-nexus"

[ralph]
enabled = true
role = "autonomous-developer"
description = "Autonomous development agent following Golden Chain workflow"
branch_prefix = "ralph/"
task_source = ".ralph/internal/fix_plan.md"
tech_tree = ".ralph/TECH_TREE.md"
success_history = ".ralph/SUCCESS_HISTORY.md"
regression_patterns = ".ralph/REGRESSION_PATTERNS.md"
circuit_breaker_threshold = 3
max_calls_per_hour = 100
timeout_minutes = 30

[ralph.permissions]
read = true
write = true
build = true
test = true
commit = true
push = false
deploy = false

[ralph.quality_gates]
build = "zig build"
test = "zig build test"
format = "zig fmt --check src/"

[ralph.workspace_modules]
core = { path = "trinity-nexus/core", deps = [] }
lang = { path = "trinity-nexus/lang", deps = ["core"] }
symb = { path = "trinity-nexus/symb", deps = ["core", "lang"] }
network = { path = "trinity-nexus/network", deps = ["core", "symb"] }
canvas = { path = "trinity-nexus/canvas", deps = ["core"] }
tools = { path = "trinity-nexus/tools", deps = ["core", "lang", "symb", "network", "canvas"] }

[clawd]
enabled = false
role = "code-reviewer"
description = "Code review agent for PR analysis"
branch_prefix = "clawd/"

[clawd.permissions]
read = true
write = false
build = true
test = true
commit = false
push = false
deploy = false

[openclaw]
enabled = true
path = "/Users/playra/openclaw"
binary = "node openclaw.mjs"
optional = true
integration = "telegram-reporting"
chat_id = "-5160767429"

[reporting]
telegram_enabled = true
report_on_commit = true
report_on_cycle_complete = true
report_format = "markdown"
