apiVersion: apps/v1
kind: Deployment
metadata:
  name: trinity-swarm
  labels:
    app: trinity-swarm
    version: v8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trinity-swarm
  template:
    metadata:
      labels:
        app: trinity-swarm
        version: v8
    spec:
      containers:
      - name: swarm-runtime
        image: trinity-swarm:v8
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: AGENT_COUNT
          value: "32"
        - name: SELF_IMPROVE_INTERVAL
          value: "300"
        - name: PROMETHEUS_PORT
          value: "9090"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: trinity-swarm-metrics
  labels:
    app: trinity-swarm
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: trinity-swarm
